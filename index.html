        .navbar {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            justify-content: space-between;
        }

        .badge { background: rgba(255, 107, 0, 0.1); color: var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; display: inline-block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-wrapper {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
        }

        .plotly-graph-div { border-radius: 12px; overflow: hidden; }
        
        .footer { text-align: center; padding: 40px; color: var(--secondary); font-size: 12px; }
