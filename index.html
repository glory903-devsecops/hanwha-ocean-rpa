    <style>
        :root {
            --primary: #FF6B00;

            --card: rgba(30, 41, 59, 0.6);
            --text: #F8FAFC;
            --secondary: #94A3B8;
            --accent: #00F2FF;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', 'Noto Sans KR', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 80px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; z-index: 1001; }
        .sidebar-item { width: 45px; height: 45px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; color: var(--secondary); cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .sidebar-item:hover { color: var(--primary); background: rgba(255, 107, 0, 0.1); border-color: rgba(255, 107, 0, 0.2); }
        .sidebar-item.active { color: var(--primary); background: rgba(255, 107, 0, 0.15); border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; overflow-y: auto; background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%); }

        .header { height: 80px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .live-badge { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--accent); background: rgba(0, 242, 255, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.2); letter-spacing: 1px; }
        .pulse { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 10px var(--accent); }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.5; transform: scale(0.9); } }

        .container { max-width: 1500px; margin: 0 auto; padding: 40px 20px; width: 100%; flex: 1; }

        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-size: 44px; font-weight: 900; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .hero p { color: var(--secondary); font-size: 18px; max-width: 700px; margin: 0 auto; line-height: 1.6; }

        .dashboard-container { position: relative; z-index: 10; padding: 15px; background: rgba(255, 255, 255, 0.03); border-radius: 40px; border: 1px solid var(--border); box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8); overflow: hidden; }

        .dashboard-wrapper { background: var(--card); border-radius: 30px; border: 1px solid var(--border); padding: 30px; backdrop-filter: blur(40px); }

        .footer { text-align: center; padding: 60px 0 40px; color: #475569; font-size: 13px; font-weight: 600; letter-spacing: 1px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
