<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>한화오션 Smart Yard: RPA 데이터 입력 (ERP)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0f172a; 
            color: #f1f5f9;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        }
        .form-card { background: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-10">
    
    <div class="max-w-xl w-full">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-black text-orange-500 italic mb-4">RPA DOCK ENTRY</h1>
            <p class="text-gray-400 font-bold tracking-widest uppercase">실시간 도크 공정률 입력 시스템</p>
        </header>

        <div class="form-card p-12 rounded-[3rem] shadow-2xl space-y-10">
            <div>
                <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-4">도크 선택</label>
                <select id="dock-name" class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-5 px-8 text-xl font-black text-white focus:outline-none focus:border-orange-500">
                    <option value="" disabled selected>관리 대상 도크를 선택하십시오</option>
                    <option>거제 제1도크</option>
                    <option>거제 제2도크</option>
                    <option>거제 제3도크</option>
                    <option>거제 제4도크</option>
                    <option>제5도크 (통영분관)</option>
                    <option>옥포 특수선 구역 A</option>
                    <option>옥포 특수선 구역 B</option>
                    <option>대형 가공 1공장</option>
                    <option>의장 부두 A</option>
                </select>
                <p class="mt-2 text-[10px] text-gray-500">* 공칭 리스트에 등록되지 않은 도크는 관리 센터에 문의하십시오.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-4">현재 공정률 (%)</label>
                    <input type="number" id="progress" placeholder="0-100" min="0" max="100" class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-5 px-8 text-3xl font-black text-white focus:outline-none focus:border-orange-500 placeholder:text-slate-800">
                </div>
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-4">현재 작업내용</label>
                    <input type="text" id="task" placeholder="예: 시운전" class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-5 px-8 text-xl font-black text-white focus:outline-none focus:border-orange-500 placeholder:text-slate-800">
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-4">안전 이슈 (선택)</label>
                <select id="safety" class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-5 px-8 text-xl font-black text-white focus:outline-none focus:border-orange-500">
                    <option>정상</option>
                    <option>[위험] 크레인 오작동</option>
                    <option>[위험] 낙하물 발생</option>
                    <option>[경고] 유해가스 감지</option>
                    <option>[주의] 분진 발생</option>
                    <option>[주의] 화기 작업 주의</option>
                </select>
            </div>

            <button onclick="submitData()" class="w-full py-8 bg-orange-500 text-white text-2xl font-black italic rounded-3xl hover:scale-[1.02] shadow-xl transition-all">실시간 데이터 전송 (UPDATE)</button>
        </div>

        <nav class="mt-12 flex justify-between px-10">
            <a href="index.html" target="_blank" class="text-xs font-black text-gray-500 hover:text-orange-500 transition-colors uppercase tracking-widest">← HUB Home</a>
            <a href="smart_yard_dashboard.html" target="_blank" class="text-xs font-black text-gray-500 hover:text-orange-500 transition-colors uppercase tracking-widest">Dashboard →</a>
        </nav>

        <footer class="mt-20 text-center opacity-40">
            <p class="text-[10px] font-black uppercase tracking-[1.5em] mb-8 text-gray-800">Hanwha Ocean AX Data Terminal</p>
            <a href="https://github.com/glory903-devsecops/hanwha-ocean-rpa" target="_blank" class="inline-flex items-center gap-2 text-xs font-black text-white hover:underline">
                GITHUB REPOSITORY
            </a>
        </footer>
    </div>

    <script>
        async function submitData() {
            const dock = document.getElementById('dock-name').value;
            const progress = document.getElementById('progress').value;
            const task = document.getElementById('task').value;
            const safety = document.getElementById('safety').value;

            if (!dock || !progress || !task) {
                alert("모든 필수 항목을 입력하십시오.");
                return;
            }

            try {
                const response = await fetch('/api/update_dock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dock, progress, task, safety })
                });

                if (response.ok) {
                    alert("성공: " + dock + " 데이터가 성공적으로 갱신되었습니다.");
                } else {
                    alert("오류: 서버 전송에 실패했습니다. (API 확인 필요)");
                }
            } catch (e) {
                console.error(e);
                alert("연결 오류: API 서버가 기동 중인지 확인하십시오.");
            }
        }
    </script>
</body>
</html>
