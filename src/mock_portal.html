<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanwha Ocean Corporate Intranet - ERP v4.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #FF6A00;
            --brand-dark: #0B0F12;
            --bg-light: #F8F9FA;
            --text-main: #333;
            --border-color: #E0E0E0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            color: var(--text-main);
        }

        header {
            background-color: var(--brand-dark);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--brand-orange);
        }

        .header-logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .container {
            max-width: 900px;
            margin: 3rem auto;
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h2 {
            margin-top: 0;
            color: var(--brand-dark);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 2rem;
            border-left: 4px solid var(--brand-orange);
            padding-left: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
        }

        select, input {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--brand-orange);
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            background-color: var(--brand-orange);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            margin-top: 1rem;
            width: 100%;
        }

        button:hover {
            background-color: #E65F00;
        }

        button:active {
            transform: scale(0.98);
        }

        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
            font-weight: 600;
        }

        .success { background-color: #D4EDDA; color: #155724; border: 1px solid #C3E6CB; display: block !important; }
        .error { background-color: #F8D7DA; color: #721C24; border: 1px solid #F5C6CB; display: block !important; }

        footer {
            text-align: center;
            margin-top: 4rem;
            color: #999;
            font-size: 0.85rem;
            padding-bottom: 2rem;
        }
    </style>
</head>
<body>

<header>
    <div class="header-logo">HANWHA OCEAN <span style="font-weight: 300;">| ERP</span></div>
    <div>관리자 본부 | 생산본부 운용팀</div>
</header>

<div class="container">
    <h2>🛠️ 생산 현장 통합 전산 시스템 (ERP Portal)</h2>
    <p class="subtitle">각 작업장(Dock/Yard)별 실시간 공정 데이터 및 특이사항을 입력하여 AX 커맨드 센터로 즉시 전송합니다.</p>

    <form id="erpForm">
        <div class="form-grid">
            <div class="form-group">
                <label>📍 작업 구역 (Workplace)</label>
                <select id="location" required>
                    <option value="">구역 선택...</option>
                    <option>거제 제1도크 (LNG)</option>
                    <option>거제 제2도크 (VLCC)</option>
                    <option>거제 제3도크</option>
                    <option>거제 제1안벽</option>
                    <option>거제 제2안벽</option>
                    <option>디지털 생산 센터</option>
                    <option>스마트 야드 실증 센터</option>
                    <option>에너지 시스템 실험 센터</option>
                    <option>스마트 시운전 센터</option>
                    <option>특수선 전용 도크</option>
                    <option>선행 도장 공장</option>
                    <option>자동 배선 작업장</option>
                </select>
            </div>

            <div class="form-group">
                <label>📈 공정률 (%)</label>
                <input type="number" id="progress" step="0.1" min="0" max="100" placeholder="예: 75.5" required>
            </div>

            <div class="form-group">
                <label>🏗️ 현재 작업 (Current Task)</label>
                <select id="task" required>
                    <option value="">작업 선택...</option>
                    <option>선체 용접</option>
                    <option>도장 작업</option>
                    <option>블록 배치</option>
                    <option>의장 작업</option>
                    <option>탑재 공정</option>
                    <option>엔진 설치</option>
                    <option>시운전</option>
                    <option>비파괴 검사</option>
                    <option>안전 점검</option>
                </select>
            </div>

            <div class="form-group">
                <label>⚠️ 안전/특이사항 (Safety Issue)</label>
                <select id="safety_issue" required>
                    <option value="안전">안전 (Safe)</option>
                    <option value="미확인">미확인 (Check Needed)</option>
                    <option value="강풍 경보 (크레인 중단)">강풍 경보 (크레인 중단)</option>
                    <option value="크레인 정기 점검 중">크레인 정기 점검 중</option>
                    <option value="낙하물 주의 (보호구 필수)">낙하물 주의 (보호구 필수)</option>
                    <option value="화재 발생 (작업 중단)">화재 발생 (작업 중단)</option>
                </select>
            </div>

            <button type="submit" class="full-width">💾 ERP 데이터 저장 및 전송</button>
        </div>
    </form>

    <div id="status"></div>
</div>

<footer>
    © 2026 Hanwha Ocean Smart Yard AX Project. 본 인트라넷은 교육 및 시연용으로 제작되었습니다.
</footer>

<script>
    document.getElementById('erpForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const statusDiv = document.getElementById('status');
        statusDiv.className = '';
        statusDiv.innerText = '데이터를 서버로 전송 중...';

        const data = {
            location: document.getElementById('location').value,
            progress: parseFloat(document.getElementById('progress').value),
            task: document.getElementById('task').value,
            safety_issue: document.getElementById('safety_issue').value
        };

        try {
            // 로컬 서버 (8082 포트)로 데이터 전송
            const response = await fetch('http://localhost:8082/api/v1/update-dock', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
            });

            const result = await response.json();

            if (response.ok) {
                statusDiv.className = 'success';
                statusDiv.innerText = `✅ 데이터 성공적으로 저장됨: ${result.message}`;
                // 폼 초기화는 선택사항
            } else {
                throw new Error(result.detail || '저장 실패');
            }
        } catch (error) {
            statusDiv.className = 'error';
            statusDiv.innerText = `❌ 서버 오류: ${error.message}. 로컬 백엔드(src/api/server.py)가 실행 중인지 확인하세요.`;
        }
    });
</script>

</body>
</html>
