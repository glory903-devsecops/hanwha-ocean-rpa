<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한화오션 AX - 실시간 야드 데이터 연동 (ERP)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --h-primary: #FF6B00;
            --h-bg: #020617;
            --h-surface: rgba(30, 41, 59, 0.4);
            --h-border: rgba(255, 255, 255, 0.08);
        }
        body { 
            background-color: var(--h-bg); 
            color: #fff; 
            font-family: 'Noto Sans KR', sans-serif;
            background-image: radial-gradient(circle at 100% 0%, rgba(249, 115, 22, 0.1), transparent 50%);
        }
        .glass { background: var(--h-surface); backdrop-filter: blur(50px); border: 1px solid var(--h-border); }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; color: #fff; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: var(--h-primary); box-shadow: 0 0 15px rgba(255,107,0,0.3); }
    </style>
</head>
<body class="p-10 lg:p-24" x-data="erpSimulator()">
    
    <header class="max-w-6xl mx-auto flex justify-between items-center mb-20">
        <div>
            <h1 class="text-5xl font-black tracking-tighter uppercase italic leading-none">ERP <span class="text-orange-500">데이터 연동 서비스</span></h1>
            <p class="text-sm text-gray-500 font-bold uppercase tracking-[0.5em] mt-4">v25.0.0 Real-time Yard Data Simulation Board</p>
        </div>
        <div class="flex items-center gap-4">
            <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10B981]"></div>
            <span class="text-xs font-black text-emerald-500 uppercase tracking-widest">Secure Link Active</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16">
        <!-- Input Form -->
        <div class="glass rounded-[3rem] p-16 space-y-12">
            <h2 class="text-3xl font-black italic uppercase tracking-tighter">Node Data Update</h2>
            
            <div class="space-y-8">
                <div class="flex flex-col gap-3">
                    <label class="text-xs font-black text-gray-500 uppercase tracking-widest">Target Asset (구역/도크)</label>
                    <input type="text" x-model="formData.dock" placeholder="e.g. 제1도크" class="input-field text-xl font-bold">
                </div>
                
                <div class="flex flex-col gap-3">
                    <label class="text-xs font-black text-gray-500 uppercase tracking-widest">Current Progress (공정률 %)</label>
                    <input type="range" x-model="formData.progress" min="0" max="100" class="w-full accent-orange-500 h-2 bg-white/10 rounded-full">
                    <div class="flex justify-between items-center">
                        <span class="text-4xl font-black text-orange-500" x-text="formData.progress + '%'"></span>
                        <input type="number" x-model="formData.progress" class="w-20 bg-transparent text-right font-mono text-xl outline-none">
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <label class="text-xs font-black text-gray-500 uppercase tracking-widest">Active Task (현재 작업)</label>
                    <select x-model="formData.task" class="input-field text-lg font-bold">
                        <option value="설계 검토">설계 검토</option>
                        <option value="도장 작업">도장 작업</option>
                        <option value="선체 조립">선체 조립</option>
                        <option value="의장 작업">의장 작업</option>
                        <option value="엔진 설치">엔진 설치</option>
                        <option value="시운전">시운전</option>
                    </select>
                </div>

                <div class="flex flex-col gap-3">
                    <label class="text-xs font-black text-gray-500 uppercase tracking-widest">Safety Issue (안전 이슈)</label>
                    <input type="text" x-model="formData.safety" placeholder="e.g. 정상, [주의] 강풍주의, [위험] 낙하물 발생" class="input-field text-lg font-bold">
                </div>
            </div>

            <button @click="submitUpdate()" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-8 rounded-2xl text-2xl transition-all shadow-xl hover:scale-[1.02]">
                Push to Dashboard
            </button>
        </div>

        <!-- Recent Activity Logs -->
        <div class="space-y-8">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter text-gray-600">RPA Sync Activity</h2>
            <div class="space-y-4">
                <template x-for="(log, index) in logs" :key="index">
                    <div class="glass rounded-2xl p-6 flex justify-between items-center border-l-4 border-orange-500 animate-fade-in">
                        <div>
                            <p class="font-black text-lg" x-text="log.dock"></p>
                            <p class="text-xs text-gray-500 uppercase" x-text="log.time"></p>
                        </div>
                        <div class="text-right">
                            <span class="text-xl font-black text-orange-500" x-text="log.progress + '%'"></span>
                            <div class="text-[10px] text-emerald-500 font-black uppercase">Synced</div>
                        </div>
                    </div>
                </template>
                <div x-show="logs.length === 0" class="text-gray-700 font-bold italic">No recent sync activity...</div>
            </div>
        </div>
    </main>

    <script>
        function erpSimulator() {
            return {
                formData: { dock: '제1도크', progress: 45, task: '도장 작업', safety: '정상' },
                logs: [],
                baseUrl: 'http://localhost:8082/api/v1',

                async submitUpdate() {
                    try {
                        const res = await fetch(`${this.baseUrl}/update-yard`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.formData)
                        });
                        
                        if (res.ok) {
                            this.logs.unshift({
                                dock: this.formData.dock,
                                progress: this.formData.progress,
                                time: new Date().toLocaleTimeString()
                            });
                            if (this.logs.length > 5) this.logs.pop();
                            
                            // Visual feedback
                            const btn = event.target;
                            const oldText = btn.innerText;
                            btn.innerText = 'DATA SYNCHRONIZED ✓';
                            btn.classList.replace('bg-orange-600', 'bg-emerald-600');
                            setTimeout(() => {
                                btn.innerText = oldText;
                                btn.classList.replace('bg-emerald-600', 'bg-orange-600');
                            }, 2000);
                        }
                    } catch (e) {
                        alert('Backend Sync Failed. Ensure run_server.py and api/main.py are running.');
                    }
                }
            }
        }
    </script>
</body>
</html>
