<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한화오션 AX - 지능형 가이드 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --h-primary: #FF6B00;
            --h-bg: #020617;
            --h-surface: rgba(30, 41, 59, 0.4);
            --h-border: rgba(255, 255, 255, 0.08);
            --h-glass-blur: blur(50px);
        }
        body { 
            background-color: var(--h-bg); 
            color: #fff; 
            font-family: 'Noto Sans KR', sans-serif;
            background-image: radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.1), transparent 50%);
            background-attachment: fixed;
        }
        .glass { background: var(--h-surface); backdrop-filter: var(--h-glass-blur); border: 1px solid var(--h-border); }
        input, textarea, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        input:focus, textarea:focus { border-color: var(--h-primary) !important; outline: none !important; }
    </style>
</head>
<body class="p-8 lg:p-20" x-data="guidelineManager()">
    
    <header class="max-w-[1600px] mx-auto flex justify-between items-center mb-24">
        <div>
            <h1 class="text-6xl font-black tracking-tighter uppercase italic leading-none">스마트 야드 <span class="text-orange-500">대처 방안 관리</span></h1>
            <p class="text-lg text-gray-500 font-bold uppercase tracking-[0.5em] mt-6">v25.0.0 Enterprise Quantum Elite Governance Portal</p>
        </div>
        <button @click="openForm()" class="bg-orange-600 hover:bg-orange-500 text-white font-black px-12 py-5 rounded-[2rem] text-2xl shadow-2xl transition-all">신규 가이드 등록</button>
    </header>

        <div class="glass rounded-[3rem] overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-white/5 border-b border-white/10 text-xl">
                    <tr>
                        <th class="p-10 font-black uppercase tracking-widest text-gray-500">위험 항목 (Issue)</th>
                        <th class="p-10 font-black uppercase tracking-widest text-gray-500">대처 방안 (Guidance)</th>
                        <th class="p-10 font-black uppercase tracking-widest text-gray-500">RPA 트리거</th>
                        <th class="p-10 font-black uppercase tracking-widest text-gray-500">로봇 ID</th>
                        <th class="p-10 font-black uppercase tracking-widest text-gray-500">심각도</th>
                        <th class="p-10 font-black uppercase tracking-widest text-gray-500 text-right">작업</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="item in guidelines" :key="item.ISSUE">
                        <tr class="hover:bg-white/[0.03] transition-colors">
                            <td class="p-10 font-black text-3xl italic tracking-tighter" x-text="item.ISSUE"></td>
                            <td class="p-10 text-xl text-gray-300 max-w-sm" x-text="item.GUIDANCE"></td>
                            <td class="p-10 text-center">
                                <code class="text-base font-mono bg-blue-500/10 text-blue-400 px-5 py-2 rounded-full border border-blue-500/20" x-text="item.RPA_TRIGGER"></code>
                            </td>
                            <td class="p-10">
                                <span class="text-xl font-black text-gray-500" x-text="item.BOT_ID"></span>
                            </td>
                            <td class="p-10">
                                <span :class="{'text-red-500': item.SEVERITY==='CRITICAL', 'text-amber-500': item.SEVERITY==='WARNING', 'text-emerald-500': item.SEVERITY==='OPTIMAL'}" 
                                      class="font-black text-xl uppercase tracking-widest" x-text="item.SEVERITY"></span>
                            </td>
                            <td class="p-10 text-right space-x-6">
                                <button @click="editItem(item)" class="text-orange-500 hover:text-white font-black text-lg underline underline-offset-8">수정</button>
                                <button @click="deleteItem(item.ISSUE)" class="text-red-500 hover:text-white font-black text-lg underline underline-offset-8">삭제</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </main>

    <div x-show="showForm" class="fixed inset-0 z-50 flex items-center justify-center p-12 bg-black/90 backdrop-blur-md" x-cloak>
        <div class="glass max-w-2xl w-full rounded-[4rem] p-20 space-y-12 animate-fade-in-up shadow-[0_0_100px_rgba(249,115,22,0.2)]">
            <h2 class="text-5xl font-black italic uppercase tracking-tighter text-orange-500 text-center"><span x-text="isEdit ? '가이드 수정' : '신규 가이드 등록'"></span></h2>
            
            <div class="space-y-10">
                <div class="space-y-4">
                    <label class="text-lg font-black uppercase text-gray-500 tracking-[0.3em]">위험 항목명</label>
                    <input type="text" x-model="formData.issue" :disabled="isEdit" class="w-full rounded-[2rem] p-8 text-2xl font-black bg-white/5 border-white/10 outline-none focus:border-orange-500 transition-all">
                </div>
                <div class="space-y-4">
                    <label class="text-lg font-black uppercase text-gray-500 tracking-[0.3em]">현장 대처 방안</label>
                    <textarea x-model="formData.guidance" rows="3" class="w-full rounded-[2rem] p-8 text-2xl font-bold bg-white/5 border-white/10 outline-none focus:border-orange-500 transition-all"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-10">
                    <div class="space-y-4">
                        <label class="text-base font-black uppercase text-gray-500 tracking-[0.2em]">RPA 트리거 조건</label>
                        <input type="text" x-model="formData.rpa_trigger" placeholder="e.g. DUST > 50" class="w-full rounded-[2rem] p-6 text-xl font-bold bg-white/5">
                    </div>
                    <div class="space-y-4">
                        <label class="text-base font-black uppercase text-gray-500 tracking-[0.2em]">지정 로봇 ID</label>
                        <input type="text" x-model="formData.bot_id" placeholder="e.g. BOT_01" class="w-full rounded-[2rem] p-6 text-xl font-bold bg-white/5">
                    </div>
                </div>
                <div class="space-y-4">
                    <label class="text-lg font-black uppercase text-gray-500 tracking-[0.3em]">위험 수위</label>
                    <select x-model="formData.severity" class="w-full rounded-[2rem] p-8 text-2xl font-black bg-white/5 appearance-none">
                        <option value="CRITICAL">🔥 CRITICAL (위험)</option>
                        <option value="WARNING">⚠️ WARNING (주의)</option>
                        <option value="OPTIMAL">✅ OPTIMAL (안전)</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-8 pt-10">
                <button @click="saveForm()" class="flex-1 bg-orange-600 hover:bg-orange-500 text-white font-black py-6 rounded-[2rem] text-2xl transition-all shadow-2xl">가이드 저장</button>
                <button @click="showForm = false" class="flex-1 bg-white/5 hover:bg-white/10 text-white font-black py-6 rounded-[2rem] text-2xl transition-all">취소</button>
            </div>
        </div>
    </div>

    <script>
        function guidelineManager() {
            return {
                guidelines: [],
                showForm: false,
                isEdit: false,
                formData: { issue: '', guidance: '', severity: 'WARNING', rpa_trigger: 'NONE', bot_id: 'DISPATCH_ALL' },
                baseUrl: 'http://localhost:8082/api/v1',

                async init() {
                    await this.loadData();
                },

                async loadData() {
                    try {
                        const res = await fetch(`${this.baseUrl}/guidelines`);
                        this.guidelines = await res.json();
                    } catch (e) { console.error('Load Fail', e); }
                },

                openForm() {
                    this.isEdit = false;
                    this.formData = { issue: '', guidance: '', severity: 'WARNING', rpa_trigger: 'NONE', bot_id: 'DISPATCH_ALL' };
                    this.showForm = true;
                },

                editItem(item) {
                    this.isEdit = true;
                    this.formData = { 
                        issue: item.ISSUE, 
                        guidance: item.GUIDANCE, 
                        severity: item.SEVERITY,
                        rpa_trigger: item.RPA_TRIGGER || 'NONE',
                        bot_id: item.BOT_ID || 'DISPATCH_ALL'
                    };
                    this.showForm = true;
                },

                async saveForm() {
                    try {
                        const res = await fetch(`${this.baseUrl}/update-guideline`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.formData)
                        });
                        if (res.ok) {
                            this.showForm = false;
                            await this.loadData();
                            alert('가이드라인이 성공적으로 반영되었습니다.');
                        }
                    } catch (e) { alert('동기화 실패'); }
                },

                async deleteItem(issue) {
                    if (!confirm('정말 삭제하시겠습니까?')) return;
                    try {
                        await fetch(`${this.baseUrl}/update-guideline`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ issue, guidance: 'delete', delete: true })
                        });
                        await this.loadData();
                    } catch (e) { alert('삭제 실패'); }
                }
            }
        }
    </script>
</body>
</html>
